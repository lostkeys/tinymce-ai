name: AI Agent

on:
  issues:
    types: [labeled]

jobs:
  implement:
    if: github.event.label.name == 'ai-task'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: yarn

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Install Claude Code
        run: npm install -g @anthropic-ai/claude-code

      - name: Run Claude Code
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          ISSUE_NUMBER="${{ github.event.issue.number }}"
          ISSUE_TITLE="${{ github.event.issue.title }}"
          ISSUE_BODY=$(gh issue view "$ISSUE_NUMBER" --json body -q .body)

          BRANCH_NAME="ai/${ISSUE_NUMBER}-$(echo "$ISSUE_TITLE" | tr '[:upper:]' '[:lower:]' | sed 's/[^a-z0-9]/-/g' | sed 's/--*/-/g' | head -c 50)"

          git checkout -b "$BRANCH_NAME"

          claude -p "You are implementing a task from a GitHub Issue for the TinyMCE editor.

          Issue #${ISSUE_NUMBER}: ${ISSUE_TITLE}

          ${ISSUE_BODY}

          Instructions:
          1. Read CLAUDE.md for project conventions and constraints.
          2. Implement the changes described in the issue.
          3. Write tests for any new functionality.
          4. Make sure the build passes (yarn build) and lint passes (yarn eslint).
          5. Commit your changes with a message starting with '#${ISSUE_NUMBER}:'.
          6. Do not modify files outside the scope specified in the issue." \
            --allowedTools "Bash(yarn build:*),Bash(yarn eslint:*),Bash(yarn tsc:*),Bash(yarn test-one:*),Bash(git add:*),Bash(git commit:*)" \
            --max-turns 50

          git push origin "$BRANCH_NAME"

          gh pr create \
            --title "AI: ${ISSUE_TITLE}" \
            --body "Closes #${ISSUE_NUMBER}

          This PR was automatically generated by the AI agent from the issue spec.

          ---
          **Review checklist:**
          - [ ] Implementation matches the acceptance criteria
          - [ ] Tests cover the new functionality
          - [ ] No unintended side effects or scope creep" \
            --base main \
            --head "$BRANCH_NAME"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
